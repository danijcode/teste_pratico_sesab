services:
  - type: web
    name: sesab-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: FRONTEND_URL
        value: https://teste-pratico-sesab.vercel.app
